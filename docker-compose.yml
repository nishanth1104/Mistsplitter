version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mistsplitter-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mistsplitter
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: mistsplitter-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mistsplitter
      PORT: 3000
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - full

  mcp:
    build:
      context: .
      dockerfile: packages/mcp/Dockerfile
    container_name: mistsplitter-mcp
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mistsplitter
      MCP_PORT: 3001
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - full

volumes:
  postgres_data:
